<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Yönlendiriliyor...</title>
    <script type="text/javascript">
        // -----------------------------------------------------------------------------------
        // GitHub Pages SPA Routing Hack - HashRouter Friendly
        // -----------------------------------------------------------------------------------
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            } else {
                // Eğer doğrudan path yazıldıysa (örn: /resident), 
                // onu hash'e çevir: /apartmanyonetimi/#/resident
                var path = l.pathname;
                var segments = path.split('/').filter(Boolean);
                var baseName = 'apartmanyonetimi';

                // Base name'i temizle
                var rest = segments.filter(function (s) { return s !== baseName; }).join('/');

                var newUrl = l.protocol + '//' + l.host + '/' + baseName + '/#/' + rest + l.search + l.hash;

                if (path.indexOf('/' + baseName) === -1 && path !== '/') {
                    // Base name yoksa ekle
                    newUrl = l.protocol + '//' + l.host + '/' + baseName + '/#/' + segments.join('/') + l.search + l.hash;
                }

                l.replace(newUrl);
            }
        }(window.location));
    </script>
</head>

<body>
    Yönlendiriliyor...
</body>

</html>
