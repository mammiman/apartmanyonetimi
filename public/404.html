<!doctype html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProYönetim - Yönlendiriliyor...</title>
    <script>
        // GitHub Pages SPA redirect
        // /apartmanyonetimi/resident  →  /apartmanyonetimi/#/resident
        // /resident (base-path'siz)   →  /apartmanyonetimi/#/resident
        (function () {
            var l = window.location;
            var baseName = 'apartmanyonetimi';
            var pathParts = l.pathname.slice(1).split('/').filter(Boolean);

            var basePath, rest;
            if (pathParts[0] === baseName) {
                basePath = '/' + baseName;
                rest = pathParts.slice(1).join('/');
            } else {
                basePath = '/' + baseName;
                rest = pathParts.join('/');
            }

            var hash = rest ? '#/' + rest : '#/';
            var search = l.search ? l.search.slice(1) : '';

            l.replace(
                l.protocol + '//' + l.host +
                basePath + '/' + hash +
                (search ? '?' + search : '')
            );
        })();
    </script>
</head>

<body>
    <p>Yönlendiriliyor...</p>
</body>

</html>
